<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duo Challenge - Fixed Magic ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4081; --dark: #0a0a0a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Poppins', sans-serif; background: var(--dark); overflow: hidden; }
        
        .container { background: white; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 6px solid var(--pink); box-sizing: border-box; z-index: 10; }
        .hidden { display: none !important; }

        /* --- MAGIC RAIN (Flowers & Sparkles) --- */
        .magic-item {
            position: absolute;
            top: -20px;
            z-index: 999; /* Sabse upar */
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Welcome Box */
        .welcome-box { text-align: center; z-index: 1000; position: relative; }
        .welcome-msg { font-family: 'Pacifico', cursive; color: var(--pink); font-size: 35px; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(255,64,129,0.3); }

        /* Other Styles */
        input[type="text"], button { padding: 12px; margin: 8px; border-radius: 12px; border: 2px solid var(--pink); width: 80%; font-size: 15px; }
        .btn { background: var(--pink); color: white; font-weight: bold; border: none; cursor: pointer; }
        .card-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; object-fit: cover; filter: brightness(25%); }
        .content { position: relative; z-index: 5; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .result-grid { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex-grow: 1; padding: 10px 0; scrollbar-width: none; }
        .ans-pill { background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px; font-size: 13px; border-left: 5px solid var(--pink); margin: 0 10px; line-height: 1.4; word-wrap: break-word; }
        .ans-pill b { color: var(--pink); display: block; font-size: 11px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="step0" class="container">
        <h2 style="color: var(--pink); font-family: 'Pacifico';">Duo Card Magic ✨</h2>
        <input type="text" id="visitorName" placeholder="Enter your name...">
        <button class="btn" onclick="showWelcome()">Unlock Magic ➡️</button>
    </div>

    <div id="welcomeScreen" class="container hidden" style="background: #fff5f8;">
        <div class="welcome-box">
            <div class="welcome-msg" id="displayWelcome"></div>
            <p style="color: #666; font-weight: 500;">Magic is falling for you! ✨🌸</p>
            <button class="btn" onclick="goToSetup()" style="margin-top: 20px;">Let's Start! 🚀</button>
        </div>
    </div>

    <div id="step1" class="container hidden">
        <h3 style="color:var(--pink);">Duo Setup</h3>
        <input type="text" id="n1" placeholder="Your Name">
        <input type="text" id="n2" placeholder="Friend's Name">
        <div style="width:85%; font-size:11px; text-align:left; color:#888;">
            <p>Your Photo: <input type="file" id="up1" accept="image/*"></p>
            <p>Friend Photo: <input type="file" id="up2" accept="image/*"></p>
            <p>Wallpaper: <input type="file" id="upBG" accept="image/*"></p>
        </div>
        <button class="btn" onclick="start()">Next ➡️</button>
    </div>

    <div id="step2" class="container hidden">
        <div style="background:white; padding:20px; border-radius:20px; width:88%; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <p id="qDisplay" style="font-weight:bold; font-size:17px;"></p>
            <input type="text" id="ansInput" placeholder="Answer here...">
            <button class="btn" onclick="nextQ()">Next ➡️</button>
        </div>
    </div>

    <div id="step3" class="container hidden">
        <h2 style="color:var(--pink)">The Surprise 🎁</h2>
        <input type="file" id="upGift" accept="image/*,video/*">
        <input type="text" id="giftEmoji" placeholder="Enter Emojis (🧸🍫)">
        <button class="btn" onclick="finish()">Finish ✨</button>
    </div>

    <div id="finalAnsSheet" class="container hidden">
        <img id="bg1" class="card-bg-layer">
        <div class="content">
            <div style="display:flex; justify-content:center; gap:10px; align-items:center;">
                <img id="f1" style="width:60px; height:60px; border-radius:50%; border:2px solid white;">
                <h2 style="color:white; font-family:'Pacifico'; font-size:18px;"><span class="nm1"></span> ♡ <span class="nm2"></span></h2>
                <img id="f2" style="width:60px; height:60px; border-radius:50%; border:2px solid white;">
            </div>
            <div class="result-grid" id="ansGrid"></div>
            <div style="background:white; padding:10px; border-radius:15px; text-align:center; margin-top:5px;">
                <div id="giftEmojiDisplay" style="font-size:20px;"></div>
                <p style="font-size:9px; color:var(--pink); font-weight:bold; margin:0;">SCROLL TO READ ALL ANSWERS</p>
            </div>
        </div>
    </div>

    <script>
        let currentIdx = 0, answers = [], p1, p2, bg, giftD;
        const questions = [
            "What’s one thing you’ve never told me because you thought I’d judge you?",
            "When do you feel most like yourself around me?",
            "What’s a dream you’re scared to say out loud?",
            "If you could relive one memory with me, which one?",
            "What’s something I do that annoys you secretly?",
            "How have I changed in the last year according to you?",
            "How can I be a better friend to you right now?",
            "If we got arrested together, what would it be for?",
            "Which of my bad decisions was your favorite?",
            "What’s the first thing you’d mess up if we swapped lives?"
        ];

        function showWelcome() {
            let name = document.getElementById('visitorName').value;
            if(!name) return alert("Enter your name!");
            document.getElementById('displayWelcome').innerText = `Welcome, ${name}!`;
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            startMagic();
        }

        // --- NEW MAGIC ANIMATION (Flowers & Sparkles) ---
        function startMagic() {
            const symbols = ['🌸', '✨', '🌼', '⭐', '🌷', '💫'];
            setInterval(() => {
                const item = document.createElement('div');
                item.className = 'magic-item';
                item.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                item.style.left = Math.random() * 100 + 'vw';
                item.style.fontSize = Math.random() * 20 + 15 + 'px';
                item.style.duration = Math.random() * 3 + 2 + 's';
                item.style.animationDuration = item.style.duration;
                
                document.getElementById('welcomeScreen').appendChild(item);
                
                setTimeout(() => { item.remove(); }, 5000);
            }, 200);
        }

        function goToSetup() { 
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
        }

        function start() {
            let f1 = document.getElementById('up1').files[0];
            let f2 = document.getElementById('up2').files[0];
            let fb = document.getElementById('upBG').files[0];
            let r = new FileReader();
            if(f1) { let r1 = new FileReader(); r1.onload=e=>p1=e.target.result; r1.readAsDataURL(f1); }
            if(f2) { let r2 = new FileReader(); r2.onload=e=>p2=e.target.result; r2.readAsDataURL(f2); }
            if(fb) { let rb = new FileReader(); rb.onload=e=>bg=e.target.result; rb.readAsDataURL(fb); }
            
            setTimeout(() => {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                loadQ();
            }, 500);
        }

        function loadQ() {
            document.getElementById('qDisplay').innerText = questions[currentIdx];
            document.getElementById('ansInput').value = "";
        }

        function nextQ() {
            let v = document.getElementById('ansInput').value;
            if(!v) return alert("Answer please!");
            answers.push(v); currentIdx++;
            if(currentIdx < 10) loadQ(); else {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }
        }

        function finish() {
            document.querySelectorAll('.nm1').forEach(e=>e.innerText=document.getElementById('n1').value);
            document.querySelectorAll('.nm2').forEach(e=>e.innerText=document.getElementById('n2').value);
            document.getElementById('giftEmojiDisplay').innerText = document.getElementById('giftEmoji').value || "💖";
            if(p1) document.getElementById('f1').src = p1;
            if(p2) document.getElementById('f2').src = p2;
            if(bg) document.getElementById('bg1').src = bg;

            let grid = document.getElementById('ansGrid');
            grid.innerHTML = "";
            answers.forEach((a, i) => {
                grid.innerHTML += `<div class="ans-pill"><b>${i+1}. ${questions[i]}</b>${a}</div>`;
            });
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('finalAnsSheet').classList.remove('hidden');
        }
    </script>
</body>
</html>
